<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="color-scheme" content="light"/>
<title>Carta dei Vini — Osteria Fondo</title>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Carta Vini"/>
<meta name="theme-color" content="#7B1C2E"/>
<style>
  /* Font principale: Recoleta (se carichi i file in /fonts) con fallback Fraunces */
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap');
  @font-face {
    font-family: 'Recoleta';
    src: url('fonts/Recoleta-Regular.woff2') format('woff2'),
         url('fonts/Recoleta-Regular.otf') format('opentype');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Recoleta';
    src: url('fonts/Recoleta-Medium.woff2') format('woff2'),
         url('fonts/Recoleta-Medium.otf') format('opentype');
    font-weight: 500; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Recoleta';
    src: url('fonts/Recoleta-SemiBold.woff2') format('woff2'),
         url('fonts/Recoleta-SemiBold.otf') format('opentype');
    font-weight: 600; font-style: normal; font-display: swap;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper: #F7F3EC;
    --paper-2: #FBF8F2;
    --ink: #211C18;
    --muted: #8A8178;
    --hint: #B4AA9F;
    --wine: #7B1C2E;
    --wine-soft: #9A4A54;
    --rule: #E4DBCE;
    --serif: 'Recoleta', 'Fraunces', Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: 3rem;
  }

  .wrap { max-width: 620px; margin: 0 auto; padding: 0 20px; }

  /* ── Intestazione ─────────────────────────────────────── */
  header {
    text-align: center;
    padding: 2.6rem 20px 1.6rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 1.8rem;
  }
  .brand-logo {
    display: block;
    width: min(220px, 60%);
    height: auto;
    margin: 0 auto 0.55rem;
  }
  .title {
    font-family: var(--serif);
    font-size: 26px;
    line-height: 1.1;
    margin: 0.5rem 0 0.15rem;
    font-weight: 400;
    letter-spacing: 0.01em;
  }
  .subtitle {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── Ricerca ──────────────────────────────────────────── */
  .search {
    position: relative;
    margin: 0 auto 1.8rem;
  }
  .search input {
    width: 100%;
    padding: 12px 14px 12px 40px;
    border: 1px solid var(--rule);
    border-radius: 999px;
    background: var(--paper-2);
    font-family: var(--sans);
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .search input:focus { border-color: var(--wine-soft); }
  .search input::placeholder { color: var(--hint); }
  .search svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--hint); }

  /* ── Sfuso della casa ─────────────────────────────────── */
  .sfuso {
    background: #F1E7E3;
    border: 1px solid #E6D3CE;
    border-radius: 14px;
    padding: 1rem 1.15rem 1.05rem;
    margin-bottom: 1.9rem;
  }
  .sfuso-title {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 500;
    color: var(--wine);
    margin-bottom: 0.6rem;
  }
  .sfuso-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    padding: 0.32rem 0;
  }
  .sfuso-row + .sfuso-row { border-top: 1px solid #E6D3CE; }
  .sfuso-nome { font-family: var(--serif); font-size: 15.5px; color: var(--ink); flex: 1; min-width: 0; }
  .sfuso-prezzi { font-size: 13.5px; color: var(--ink); white-space: nowrap; font-variant-numeric: tabular-nums; }

  /* ── Sezioni categoria (a tendina) ────────────────────── */
  .cat { border-bottom: 1px solid var(--rule); }
  .cat-head {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 1.05rem 2px;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    -webkit-tap-highlight-color: transparent;
  }
  .cat-head h2 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 23px;
    color: var(--wine);
    letter-spacing: 0.01em;
    flex: 1;
  }
  .cat-head .chev {
    flex-shrink: 0;
    color: var(--wine-soft);
    transition: transform 0.25s ease;
  }
  .cat.open .cat-head .chev { transform: rotate(180deg); }

  .panel {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.28s ease;
  }
  .cat.open .panel { grid-template-rows: 1fr; }
  .panel-inner { overflow: hidden; min-height: 0; }

  .subcat {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--wine-soft);
    margin: 1rem 0 0.1rem;
    padding-bottom: 0.35rem;
    border-bottom: 1px solid var(--rule);
  }
  .subcat:first-child { margin-top: 0.2rem; }

  /* ── Singolo vino ─────────────────────────────────────── */
  .wine { padding: 0.85rem 0; border-bottom: 1px solid var(--rule); }
  .wine:last-child { border-bottom: none; }
  .wine-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 14px;
  }
  .wine-name {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.3;
  }
  .wine-price {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .wine-meta {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── Stati ────────────────────────────────────────────── */
  .state { text-align: center; color: var(--muted); padding: 3rem 1rem; }
  .state .big { font-family: var(--serif); font-size: 19px; color: var(--ink); margin-bottom: 0.4rem; }
  .spinner {
    width: 26px; height: 26px; margin: 0 auto 1rem;
    border: 2px solid var(--rule); border-top-color: var(--wine);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .retry {
    margin-top: 1rem; padding: 10px 22px;
    border: 1px solid var(--wine); border-radius: 999px;
    background: transparent; color: var(--wine);
    font-family: var(--sans); font-size: 14px; cursor: pointer;
  }
  .retry:hover { background: var(--wine); color: var(--paper-2); }

  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <img class="brand-logo" src="logo.svg" alt="Osteria Fondo" />
  <h1 class="title">La Carta dei Vini</h1>
</header>

<div class="wrap">

  <div class="search" id="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="Cerca un vino, un produttore…" autocomplete="off"/>
  </div>

  <div class="sfuso">
    <div class="sfuso-title">Lo Sfuso della Casa</div>
    <div class="sfuso-row">
      <span class="sfuso-nome">Bianco — Trebbiano Bio</span>
      <span class="sfuso-prezzi">€ 7 (0,5) · € 10 (0,75)</span>
    </div>
    <div class="sfuso-row">
      <span class="sfuso-nome">Rosso — Sangiovese Bio</span>
      <span class="sfuso-prezzi">€ 7 (0,5) · € 10 (0,75)</span>
    </div>
  </div>

  <div id="content"></div>

  <div id="loading" class="state">
    <div class="spinner"></div>
    Caricamento della carta…
  </div>

</div>

<script>
// Stesso backend Google Apps Script del gestionale (sola lettura: action=leggi)
const URL = 'https://script.google.com/macros/s/AKfycbybqP4MzxDZmoWLvccj4bCXEMMssdqnqDeBKGpTo6HRjE8zBXlHNCTebwHggjWvCuec/exec';

// Ordine e nomi delle categorie in carta.
// sub: true => mostra le sottocategorie Italia / Estero (campo "area" del vino)
const CATEGORIE = [
  { key: 'bollicine', nome: 'Bollicine', sub: true },
  { key: 'bianchi',   nome: 'Bianchi',   sub: true },
  { key: 'macerati',  nome: 'Macerati',  sub: false },
  { key: 'rosati',    nome: 'Rosati',    sub: false },
  { key: 'rossi',     nome: 'Rossi',     sub: true }
];

let dati = { bianchi: [], rossi: [], bollicine: [], macerati: [], rosati: [] };
let filtro = '';
const aperte = new Set();   // categorie aperte dall'utente (tutte chiuse all'avvio)

const el = (id) => document.getElementById(id);

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

async function carica() {
  el('loading').classList.remove('hidden');
  el('content').innerHTML = '';
  try {
    const res = await fetch(URL + '?action=leggi');
    const d = await res.json();
    if (d.errore) throw new Error(d.errore);
    dati = {
      bianchi: d.bianchi || [],
      rossi: d.rossi || [],
      bollicine: d.bollicine || [],
      macerati: d.macerati || [],
      rosati: d.rosati || []
    };
    render();
  } catch (e) {
    el('loading').classList.add('hidden');
    el('content').innerHTML =
      '<div class="state">' +
      '<div class="big">Carta momentaneamente non disponibile</div>' +
      'Riprova tra qualche istante.' +
      '<div><button class="retry" onclick="carica()">Riprova</button></div>' +
      '</div>';
  }
}

function disponibili(lista) {
  const q = filtro.trim().toLowerCase();
  return (lista || []).filter(v => {
    if ((parseInt(v.qty) || 0) < 1) return false;          // solo giacenza >= 1
    if (!q) return true;
    const testo = (v.nome + ' ' + (v.produttore || '') + ' ' +
                   (v.vitigno || '') + ' ' + (v.regione || '')).toLowerCase();
    return testo.includes(q);
  });
}

function rigaVino(v) {
  const meta = [v.produttore, v.vitigno, v.regione]
    .filter(x => x && String(x).trim() !== '')
    .map(esc).join(' · ');
  const prezzo = (v.vendita && String(v.vendita).trim() !== '')
    ? '<span class="wine-price">' + esc(v.vendita) + '</span>' : '';
  return (
    '<div class="wine">' +
      '<div class="wine-top">' +
        '<span class="wine-name">' + esc(v.nome) + '</span>' +
        prezzo +
      '</div>' +
      (meta ? '<div class="wine-meta">' + meta + '</div>' : '') +
    '</div>'
  );
}

// Regioni italiane ordinate da nord a sud (parole chiave per riconoscere il campo "regione")
function norm(s) {
  return String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}
const REGIONI_NORD_SUD = [
  ['trentino', 'alto adige', 'sudtirol', 'bolzano', 'trento'],
  ["valle d'aosta", 'valle daosta', 'aosta'],
  ['friuli', 'venezia giulia'],
  ['veneto'],
  ['lombardia'],
  ['piemonte'],
  ['liguria'],
  ['emilia', 'romagna'],
  ['toscana'],
  ['marche'],
  ['umbria'],
  ['lazio'],
  ['abruzzo'],
  ['molise'],
  ['campania'],
  ['puglia'],
  ['basilicata'],
  ['calabria'],
  ['sicilia'],
  ['sardegna']
];
function indiceRegione(regione) {
  const r = norm(regione);
  for (let i = 0; i < REGIONI_NORD_SUD.length; i++) {
    for (const k of REGIONI_NORD_SUD[i]) {
      if (r.indexOf(k) !== -1) return i;
    }
  }
  return 999; // regione sconosciuta o vuota: in fondo
}

// Contenuto di una categoria: con sottocategorie Italia/Estero se cat.sub
function contenutoCategoria(cat, vini) {
  if (!cat.sub) return vini.map(rigaVino).join('');

  const italia = [], estero = [], altri = [];
  vini.forEach(v => {
    const a = String(v.area || '').trim().toLowerCase();
    if (a === 'italia') italia.push(v);
    else if (a === 'estero') estero.push(v);
    else altri.push(v);  // area non impostata: mostrato comunque (senza sottotitolo)
  });

  // I vini italiani vengono ordinati per regione, da nord a sud
  italia.sort((a, b) => indiceRegione(a.regione) - indiceRegione(b.regione));

  let out = '';
  if (italia.length) out += '<div class="subcat">Italia</div>' + italia.map(rigaVino).join('');
  if (estero.length) out += '<div class="subcat">Estero</div>' + estero.map(rigaVino).join('');
  if (altri.length)  out += altri.map(rigaVino).join('');
  return out;
}

function render() {
  el('loading').classList.add('hidden');

  let html = '';
  let totale = 0;

  const filtroAttivo = filtro.trim() !== '';
  CATEGORIE.forEach(cat => {
    const vini = disponibili(dati[cat.key]);
    if (vini.length === 0) return;
    totale += vini.length;
    // Con la ricerca attiva le tendine con risultati si aprono da sole
    const aperta = filtroAttivo ? true : aperte.has(cat.key);
    html +=
      '<section class="cat' + (aperta ? ' open' : '') + '" data-key="' + cat.key + '">' +
        '<button class="cat-head" type="button" aria-expanded="' + aperta + '">' +
          '<h2>' + cat.nome + '</h2>' +
          '<svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' +
        '</button>' +
        '<div class="panel"><div class="panel-inner">' +
          contenutoCategoria(cat, vini) +
        '</div></div>' +
      '</section>';
  });

  if (totale === 0) {
    html =
      '<div class="state">' +
        '<div class="big">' +
          (filtro.trim() ? 'Nessun vino corrisponde alla ricerca' : 'Nessun vino disponibile al momento') +
        '</div>' +
        (filtro.trim() ? 'Prova con un altro termine.' : 'Torna a trovarci presto.') +
      '</div>';
  }

  el('content').innerHTML = html;
}

// Apertura/chiusura tendine (delega: il contenuto viene rigenerato a ogni render)
el('content').addEventListener('click', (e) => {
  const head = e.target.closest('.cat-head');
  if (!head) return;
  const sec = head.closest('.cat');
  const key = sec.getAttribute('data-key');
  const nowOpen = !sec.classList.contains('open');
  sec.classList.toggle('open', nowOpen);
  head.setAttribute('aria-expanded', nowOpen);
  if (nowOpen) aperte.add(key); else aperte.delete(key);
});

// Ricerca dal vivo
el('search').addEventListener('input', (e) => {
  filtro = e.target.value;
  render();
});

// Aggiorna quando si riapre la scheda (così le disponibilità restano fresche)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') carica();
});

carica();
</script>
</body>
</html>
