<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="color-scheme" content="light"/>
<title>Carta dei Vini — Osteria Fondo</title>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Carta Vini"/>
<meta name="theme-color" content="#7B1C2E"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper: #F7F3EC;
    --paper-2: #FBF8F2;
    --ink: #211C18;
    --muted: #8A8178;
    --hint: #B4AA9F;
    --wine: #7B1C2E;
    --wine-soft: #9A4A54;
    --rule: #E4DBCE;
    --serif: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: 3rem;
  }

  .wrap { max-width: 620px; margin: 0 auto; padding: 0 20px; }

  /* ── Intestazione ─────────────────────────────────────── */
  header {
    text-align: center;
    padding: 2.6rem 20px 1.6rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 1.8rem;
  }
  .brand {
    font-family: var(--serif);
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--wine);
    font-weight: 700;
  }
  .title {
    font-family: var(--serif);
    font-size: 34px;
    line-height: 1.1;
    margin: 0.5rem 0 0.15rem;
    font-weight: 400;
    letter-spacing: 0.01em;
  }
  .subtitle {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── Ricerca ──────────────────────────────────────────── */
  .search {
    position: relative;
    margin: 0 auto 1.8rem;
  }
  .search input {
    width: 100%;
    padding: 12px 14px 12px 40px;
    border: 1px solid var(--rule);
    border-radius: 999px;
    background: var(--paper-2);
    font-family: var(--sans);
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .search input:focus { border-color: var(--wine-soft); }
  .search input::placeholder { color: var(--hint); }
  .search svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--hint); }

  /* ── Sezioni categoria ────────────────────────────────── */
  .cat { margin-bottom: 2.4rem; }
  .cat-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 1rem;
  }
  .cat-head h2 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 21px;
    color: var(--wine);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .cat-head .rule { flex: 1; height: 1px; background: var(--rule); }
  .cat-head .count { font-size: 12px; color: var(--muted); }

  /* ── Singolo vino ─────────────────────────────────────── */
  .wine { padding: 0.85rem 0; border-bottom: 1px solid var(--rule); }
  .wine:last-child { border-bottom: none; }
  .wine-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 14px;
  }
  .wine-name {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.3;
  }
  .wine-price {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .wine-meta {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
  }
  .wine-adj {
    font-family: var(--serif);
    font-style: italic;
    font-size: 13.5px;
    color: var(--wine-soft);
    margin-top: 5px;
  }

  /* ── Stati ────────────────────────────────────────────── */
  .state { text-align: center; color: var(--muted); padding: 3rem 1rem; }
  .state .big { font-family: var(--serif); font-size: 19px; color: var(--ink); margin-bottom: 0.4rem; }
  .spinner {
    width: 26px; height: 26px; margin: 0 auto 1rem;
    border: 2px solid var(--rule); border-top-color: var(--wine);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .retry {
    margin-top: 1rem; padding: 10px 22px;
    border: 1px solid var(--wine); border-radius: 999px;
    background: transparent; color: var(--wine);
    font-family: var(--sans); font-size: 14px; cursor: pointer;
  }
  .retry:hover { background: var(--wine); color: var(--paper-2); }

  footer {
    text-align: center;
    font-size: 11.5px;
    letter-spacing: 0.08em;
    color: var(--hint);
    padding-top: 1.5rem;
    border-top: 1px solid var(--rule);
    margin-top: 1rem;
  }

  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <div class="brand">Osteria Fondo</div>
  <h1 class="title">Carta dei Vini</h1>
  <div class="subtitle">Selezione disponibile</div>
</header>

<div class="wrap">

  <div class="search" id="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="Cerca un vino, un produttore…" autocomplete="off"/>
  </div>

  <div id="content"></div>

  <div id="loading" class="state">
    <div class="spinner"></div>
    Caricamento della carta…
  </div>

  <footer id="footer" class="hidden">
    Solo vini disponibili · aggiornato in tempo reale
  </footer>

</div>

<script>
// Stesso backend Google Apps Script del gestionale (sola lettura: action=leggi)
const URL = 'https://script.google.com/macros/s/AKfycbybqP4MzxDZmoWLvccj4bCXEMMssdqnqDeBKGpTo6HRjE8zBXlHNCTebwHggjWvCuec/exec';

// Ordine e nomi delle categorie in carta
const CATEGORIE = [
  { key: 'bollicine', nome: 'Bollicine' },
  { key: 'bianchi',   nome: 'Vini Bianchi' },
  { key: 'rossi',     nome: 'Vini Rossi' }
];

let dati = { bianchi: [], rossi: [], bollicine: [] };
let filtro = '';

const el = (id) => document.getElementById(id);

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

async function carica() {
  el('loading').classList.remove('hidden');
  el('content').innerHTML = '';
  el('footer').classList.add('hidden');
  try {
    const res = await fetch(URL + '?action=leggi');
    const d = await res.json();
    if (d.errore) throw new Error(d.errore);
    dati = {
      bianchi: d.bianchi || [],
      rossi: d.rossi || [],
      bollicine: d.bollicine || []
    };
    render();
  } catch (e) {
    el('loading').classList.add('hidden');
    el('content').innerHTML =
      '<div class="state">' +
      '<div class="big">Carta momentaneamente non disponibile</div>' +
      'Riprova tra qualche istante.' +
      '<div><button class="retry" onclick="carica()">Riprova</button></div>' +
      '</div>';
  }
}

function disponibili(lista) {
  const q = filtro.trim().toLowerCase();
  return (lista || []).filter(v => {
    if ((parseInt(v.qty) || 0) < 1) return false;          // solo giacenza >= 1
    if (!q) return true;
    const testo = (v.nome + ' ' + (v.produttore || '') + ' ' +
                   (v.vitigno || '') + ' ' + (v.regione || '')).toLowerCase();
    return testo.includes(q);
  });
}

function rigaVino(v) {
  const meta = [v.produttore, v.vitigno, v.regione]
    .filter(x => x && String(x).trim() !== '')
    .map(esc).join(' · ');
  const prezzo = (v.vendita && String(v.vendita).trim() !== '')
    ? '<span class="wine-price">' + esc(v.vendita) + '</span>' : '';
  const adj = (v.adj && String(v.adj).trim() !== '')
    ? '<div class="wine-adj">' + esc(v.adj) + '</div>' : '';
  return (
    '<div class="wine">' +
      '<div class="wine-top">' +
        '<span class="wine-name">' + esc(v.nome) + '</span>' +
        prezzo +
      '</div>' +
      (meta ? '<div class="wine-meta">' + meta + '</div>' : '') +
      adj +
    '</div>'
  );
}

function render() {
  el('loading').classList.add('hidden');

  let html = '';
  let totale = 0;

  CATEGORIE.forEach(cat => {
    const vini = disponibili(dati[cat.key]);
    if (vini.length === 0) return;
    totale += vini.length;
    html +=
      '<section class="cat">' +
        '<div class="cat-head">' +
          '<h2>' + cat.nome + '</h2>' +
          '<span class="rule"></span>' +
          '<span class="count">' + vini.length + '</span>' +
        '</div>' +
        vini.map(rigaVino).join('') +
      '</section>';
  });

  if (totale === 0) {
    html =
      '<div class="state">' +
        '<div class="big">' +
          (filtro.trim() ? 'Nessun vino corrisponde alla ricerca' : 'Nessun vino disponibile al momento') +
        '</div>' +
        (filtro.trim() ? 'Prova con un altro termine.' : 'Torna a trovarci presto.') +
      '</div>';
  }

  el('content').innerHTML = html;
  el('footer').classList.toggle('hidden', totale === 0);
}

// Ricerca dal vivo
el('search').addEventListener('input', (e) => {
  filtro = e.target.value;
  render();
});

// Aggiorna quando si riapre la scheda (così le disponibilità restano fresche)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') carica();
});

carica();
</script>
</body>
</html>
